<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>
    <style>
      @font-face {
        font-family: "Outfit";
        src: url("./Outfit/static/Outfit-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Outfit";
        src: url("./Outfit/static/Outfit-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        /* colors */
        --White: hsl(0, 0%, 100%);
        --Slate-300: hsl(212, 45%, 89%);
        --Slate-500: hsl(216, 15%, 48%);
        --Slate-900: hsl(218, 44%, 22%);

        /* spacing */
        --space-16: 16px;
        --space-24: 24px;
        --space-40: 40px;

        /* font */
        --Outfit-font: "Outfit", sans-serif;
      }

      .text-title {
        font: 700 22px/26px var(--Outfit-font);
        letter-spacing: 0;
        color: var(--Slate-900);
      }

      .text-body {
        font: 400 15px/1.4 var(--Outfit-font);
        letter-spacing: 0.2px;
        color: var(--Slate-500);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--Outfit-font);
        font-weight: 400;
        background-color: var(--Slate-300);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: 320px;
        padding: var(--space-16) var(--space-16) var(--space-40) var(--space-16);

        background-color: var(--White);
        border-radius: 20px;
        box-shadow: 0 25px 25px 0 rgba(0, 0, 0, 0.0477);

        display: flex;
        flex-direction: column;
        gap: var(--space-24);
      }

      .image-qr {
        display: block;
        width: 100%;
        border-radius: 10px;
      }

      .text {
        display: flex;
        flex-direction: column;
        gap: var(--space-16);
        padding: 0 var(--space-16);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <img
          class="image-qr"
          src="./images/image-qr-code.png"
          alt="QR code linking to Frontend Mentor website"
        />
      </figure>
      <section class="text">
        <h1 class="text-title">
          Improve your front-end skills by building projects
        </h1>
        <p class="text-body">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </section>
    </main>
  </body>
</html>
